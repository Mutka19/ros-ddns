services:
  daemon:
    build: .
    image: ros-ddnsd:latest
    restart: unless-stopped
    network_mode: host
    environment:
      ROS_HOST: 192.168.88.1 # 192.168.88.1 is the default gateway address, update to your default
      CF_RECORD_NAME: router.example.com # Replace with desired DNS record name
      CF_RECORD_ID: # Add your Cloudflare DNS record ID here
      CF_ZONE_ID: # Add your Cloudflare zone ID here
      RECORD_TTL: 60
      CHECK_INTERVAL: 30
    secrets:
      - cf_api_token
      - ros_user
      - ros_pass
secrets:
  cf_api_token:
    file: ./secrets/cf_api_token.txt
  ros_user:
    file: ./secrets/ros_user.txt
  ros_pass:
    file: ./secrets/ros_pass.txt
    
